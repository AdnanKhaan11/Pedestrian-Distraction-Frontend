# ================================================================
# PVD System — nginx Configuration
# ================================================================
# WHAT THIS FILE DOES:
#   - Serves the React app (SPA) on port 80
#   - Handles React Router — no 404 on page refresh
#   - Proxies /api/ requests to backend FastAPI server
#   - Proxies /ws/ WebSocket for live detection feed
#   - Caches static assets for better performance
#   - Handles large base64 frame uploads from webcam
# ================================================================

server {
    # ── Listen on port 80 ─────────────────────────────────────
    listen 80;
    server_name localhost;

    # ── Root folder — where React build files are ─────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Allow large request bodies ────────────────────────────
    # Needed because webcam sends base64 encoded frames
    # which can be large (up to 10MB per frame)
    client_max_body_size 20M;

    # ── Timeouts ─────────────────────────────────────────────
    # Extended for ML inference which can take a few seconds
    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;

    # ── React App (SPA Routing) ───────────────────────────────
    # All routes go to index.html so React Router works correctly
    # Without this, refreshing on /dashboard gives 404
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html — always get latest version
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── API Proxy → Backend FastAPI ───────────────────────────
    # All requests to /api/ are forwarded to backend container
    # "backend" is the Docker service name in docker-compose.yml
    # The browser thinks it's talking to localhost — no CORS issues
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # Forward real client info to backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeout for ML inference requests
        proxy_read_timeout 120s;
    }

    # ── WebSocket Proxy → Backend FastAPI ────────────────────
    # /ws/ handles live detection feed from webcam
    # WebSocket needs special headers: Upgrade + Connection
    # proxy_read_timeout 86400s = 24 hours (persistent connection)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # Required WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info to backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Keep connection alive for 24 hours
        # WebSocket for live video feed must not time out
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Static Assets Caching ─────────────────────────────────
    # JS, CSS, images, fonts are cached for 1 year
    # Vite adds content hash to filenames so cache is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Return 404 if file not found (don't fall back to index.html)
        try_files $uri =404;
    }

    # ── Gzip Compression ─────────────────────────────────────
    # Compresses responses to reduce bandwidth usage
    # Makes the app load faster for the user
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Error Pages ───────────────────────────────────────────
    # Send all errors back to React so it can handle them
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
